<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>mlx-tune — OG Image</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Subtle top gradient glow — matches homepage hero-glow */
    body::before {
      content: '';
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.03) 0%, transparent 70%);
    }

    .content {
      text-align: center;
      z-index: 1;
      position: relative;
    }

    .logo {
      margin-bottom: 28px;
    }
    .logo img {
      height: 88px;
      width: auto;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.025em;
      margin-bottom: 14px;
      line-height: 1.25;
    }

    .subtitle {
      font-size: 19px;
      color: #888888;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .install-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 28px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 17px;
      color: #1a1a1a;
    }
    .install-pill .dollar {
      color: #888888;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo">
      <img src="logo.png" alt="mlx-tune" />
    </div>
    <h1>Fine-tune LLMs, Vision, and Audio models on your Mac</h1>
    <p class="subtitle">SFT, DPO, GRPO, Vision, TTS, STT, and OCR fine-tuning — natively on MLX.<br>Unsloth-compatible API.</p>
    <div class="install-pill">
      <span class="dollar">$</span> pip install mlx-tune
    </div>
  </div>
</body>
</html>
